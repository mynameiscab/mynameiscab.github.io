  },
  learningModules:{
    problem:{title:'什么是结构化思考？',content:'<p>结构化思考是把复杂问题拆分成清晰步骤的方法。</p><div class="learning-example"><b>问题：</b>为什么手机使用体验下降？<br><br><b>分析：</b>现象 → 原因 → 验证 → 方案</div>'},
    define:{title:'如何重新定义问题？',content:'<p>不要只解决表面现象，需要找到真正目标。</p><div class="learning-example"><b>表面问题：</b>手机变卡。<br><br><b>重新定义：</b>如何恢复正常使用体验？</div>'},
    variable:{title:'如何拆分变量并分类信息？',content:'<p>复杂问题由多个因素共同影响，需要同时拆分变量和分类信息。</p><div class="learning-example"><b>手机续航下降：</b><br><b>变量拆分：</b>电池健康度、后台程序、使用习惯、系统设置<br><br><b>事实：</b>一天充两次电<br><b>假设：</b>电池老化<br><b>未知：</b>是否还有其他耗电因素</div>'},
    fact:{title:'事实、假设与未知',content:'<p>分析时需要区分不同信息类型，它们共同构成完整的问题图景。</p><div class="learning-example"><b>事实：</b>手机一天需要充两次电。<br><br><b>假设：</b>电池可能老化。<br><br><b>未知：</b>是否存在其他耗电因素。</div>'},
    model:{title:'如何建立模型？',content:'<p>模型用于描述问题因素之间的关系。</p><div class="learning-example">现象 → 原因 → 验证 → 方案</div>'},
    verify:{title:'如何验证方案？',content:'<p>分析结果需要通过实际反馈验证。</p><div class="learning-example"><b>方案：</b>关闭后台程序。<br><br><b>验证：</b>观察耗电变化。</div>'}
  },
  mindmaps:{
    child:['这是什么问题？','信息可靠吗？','重新定义问题','拆分变量<br>分类信息','建立模型<br>找办法','验证方案<br>有效吗？','执行方案','改进优化'],
    pro:['问题类型判断','信息验证','重新定义问题','变量拆分<br>信息分类','建立模型','验证模型','执行方案','反馈优化']
  }
};

// ============================================================
// 应用核心
// ============================================================

const app = {
  state:{mode:'pro',workMode:'analysis',data:{},theme:'light',_initialized:false},
  toast(msg,type='info'){
    const el=document.getElementById('toast');
    el.textContent=msg;
    el.className='toast show '+type;
    clearTimeout(this._toastTimer);
    this._toastTimer=setTimeout(()=>el.className='toast',1500);
  },
  toggleTheme(){
    if(!document.getElementById('darkThemeStyle')){
      const style=document.createElement('style');
      style.id='darkThemeStyle';
      style.textContent=DARK_THEME_CSS;
      document.head.appendChild(style);
    }
    this.state.theme=this.state.theme==='light'?'dark':'light';
    document.body.classList.toggle('dark-mode',this.state.theme==='dark');
    this.toast('已切换至'+(this.state.theme==='dark'?'暗色':'亮色')+'主题','success');
  },
  init(){
    if(this._initialized)return;
    document.querySelector('input[name="mode"][value="pro"]').checked=true;
    document.querySelector('input[name="workMode"][value="analysis"]').checked=true;
    this.switchWorkMode('analysis');
    this.renderAll();
    this._initialized=true;
  },
  renderAll(){
    this.renderSteps();
    this.renderMindmap();
    this.renderCases();
    this.renderLearningMenu();
  },
  getAllFieldIds(){
    const steps=CONFIG.steps[this.state.mode]||CONFIG.steps.pro,ids=[];
    for(let i=0;i<steps.length;i++){const s=steps[i];ids.push(s.id);if(s.hasCollapse&&s.fields){for(let j=0;j<s.fields.length;j++)ids.push(s.fields[j].id);}}
    return ids;
  },
  updateProgress(){
    const data=this.state.data,ids=this.getAllFieldIds();
    let filled=0;
    for(let i=0;i<ids.length;i++){const v=data[ids[i]];if(v&&v.trim()!=='')filled++;}
    const total=ids.length,percent=total>0?Math.round(filled/total*100):0;
    const fill=document.getElementById('progressFill'),text=document.getElementById('progressText');
    if(fill){fill.style.width=percent+'%';fill.style.background=percent<30?'#e74c3c':percent<60?'#f39c12':percent<90?'#4a90e2':'#27ae60';}
    if(text)text.textContent='完成度：'+percent+'%（'+filled+'/'+total+'）';
    return {percent,filled,total};
  },
  setField(id,value){
    this.state.data[id]=value;
    const el=document.getElementById(id);if(el)el.value=value;
    if(id==='type'){this.updateTypeInfo(value);this.updatePrompts(value);}
    this.updateProgress();
  },
  setData(data){
    this.state.data={...data};
    this.renderSteps();
    if(data.type){this.updateTypeInfo(data.type);this.updatePrompts(data.type);}
    this.updateProgress();
  },
  mapOptionValue(value,fromMode,toMode){
    if(!value||value.trim()==='')return'';
    const key=fromMode==='pro'&&toMode==='child'?'pro2child':fromMode==='child'&&toMode==='pro'?'child2pro':null;
    return key&&CONFIG.optionMap[key][value]?CONFIG.optionMap[key][value]:value;
  },
  switchMode(mode){
    // 保存旧数据（包含所有子字段）
    const oldData={...this.state.data};
    const oldMode=this.state.mode;
    this.state.mode=mode;
    // 重新渲染步骤
    this.renderSteps();
    // 恢复数据（包含所有子字段）
    const newData={};
    const steps=CONFIG.steps[mode]||CONFIG.steps.pro;
    for(let i=0;i<steps.length;i++){
      const s=steps[i];
      // 恢复顶层字段
      if(oldData[s.id]!==undefined){
        if(s.id==='credibility'||s.id==='type'){
          newData[s.id]=this.mapOptionValue(oldData[s.id],oldMode,mode);
        }else{
          newData[s.id]=oldData[s.id];
        }
      }
      // 恢复折叠面板子字段
      if(s.hasCollapse&&s.fields){
        for(let j=0;j<s.fields.length;j++){
          const f=s.fields[j];
          if(oldData[f.id]!==undefined){
            newData[f.id]=oldData[f.id];
          }
        }
      }
    }
    // 应用恢复的数据
    this.state.data={...newData};
    // 同步DOM
    for(let key in newData){
      const el=document.getElementById(key);
      if(el)el.value=newData[key];
    }
    this.renderMindmap();
    if(newData.type){this.updateTypeInfo(newData.type);this.updatePrompts(newData.type);}
    this.updateProgress();
  },
  switchWorkMode(mode){
    this.state.workMode=mode;
    const a=document.getElementById('analysisArea'),am=document.getElementById('analysisMode'),lm=document.getElementById('learningMode');
    if(mode==='analysis'){a.classList.remove('hidden');am.classList.remove('hidden');lm.classList.add('hidden');}
    else{a.classList.add('hidden');am.classList.add('hidden');lm.classList.remove('hidden');}
  },
  renderSteps(){
    const container=document.getElementById('stepsContainer');
    const steps=CONFIG.steps[this.state.mode]||CONFIG.steps.pro,data=this.state.data;
    let html='';
    for(let i=0;i<steps.length;i++){
      const s=steps[i],val=data[s.id]||'';
      if(s.hasCollapse&&s.fields){
        let fHtml='';
        for(let j=0;j<s.fields.length;j++){const f=s.fields[j];fHtml+='<b>'+f.label+'</b><textarea id="'+f.id+'" placeholder="'+f.placeholder+'">'+(data[f.id]||'')+'</textarea>';}
        html+='<div class="step" data-step="'+s.id+'"><span class="title">'+(i+1)+'. '+s.label+'</span><textarea id="'+s.id+'" placeholder="'+s.placeholder+'">'+val+'</textarea><details class="collapsible-section"><summary>📋 信息分类（点击展开/收起）</summary><div class="info-box">'+fHtml+'</div></details></div>';
      }else if(s.id==='credibility'||s.id==='type'){
        const opts=s.options||(s.id==='credibility'?['已验证','可靠来源','个人描述','未确认','推测']:['明确问题','复杂问题','开放问题']);
        const hasVal=val&&val.trim()!=='';
        let optHtml='';
        for(let j=0;j<opts.length;j++){const o=opts[j];optHtml+='<option value="'+o+'"'+(val===o?' selected':'')+'>'+o+'</option>';}
        html+='<div class="step" data-step="'+s.id+'"><span class="title">'+(i+1)+'. '+s.label+'</span><select id="'+s.id+'" onchange="app.handleSelectChange(\''+s.id+'\')"><option value="" disabled'+(hasVal?'':' selected')+'>请选择'+s.label+'</option>'+optHtml+'</select>'+(s.id==='type'?'<div id="typeInfo"></div>':'')+'</div>';
      }else{
        html+='<div class="step" data-step="'+s.id+'"><span class="title">'+(i+1)+'. '+s.label+'</span><textarea id="'+s.id+'" placeholder="'+s.placeholder+'">'+val+'</textarea></div>';
      }
    }
    container.innerHTML=html;
    if(data.type)this.updateTypeInfo(data.type);
    this.updateProgress();
  },
  renderMindmap(){
    const container=document.getElementById('mindmap');
    const nodes=CONFIG.mindmaps[this.state.mode]||CONFIG.mindmaps.pro;
    let html='';
    for(let i=0;i<nodes.length;i++){html+='<div class="node">'+nodes[i]+'</div>'+(i<nodes.length-1?'<div class="arrow">↓</div>':'');}
    container.innerHTML=html;
  },
  renderCases(){
    const container=document.getElementById('caseButtons');
    const entries=Object.entries(CONFIG.cases);
    let html='';
    for(let i=0;i<entries.length;i++){const kv=entries[i];html+='<button onclick="app.loadCase(\''+kv[0]+'\')">'+kv[1].label+'</button>';}
    container.innerHTML=html;
  },
  renderLearningMenu(){
    const container=document.getElementById('learningMenu');
    const entries=Object.entries(CONFIG.learningModules);
    let html='';
    for(let i=0;i<entries.length;i++){const kv=entries[i];html+='<button onclick="app.loadLearning(\''+kv[0]+'\')">'+kv[1].title+'</button>';}
    container.innerHTML=html;
  },
  handleSelectChange(id){const el=document.getElementById(id);if(el)this.setField(id,el.value);},
  updateTypeInfo(type){const el=document.getElementById('typeInfo');if(el)el.textContent=CONFIG.typeDescriptions[type]||'';},
  updatePrompts(type){
    const p=CONFIG.prompts[type];if(!p)return;
    const keys=['problem','split','model'];
    for(let i=0;i<keys.length;i++){const k=keys[i];const el=document.getElementById(k);if(el&&p[k])el.placeholder=p[k];}
  },
  loadCase(name){
    const d=CONFIG.cases[name];if(!d){this.toast('案例不存在','error');return;}
    this.setData(d);this.toast('已加载案例：'+d.label,'success');document.getElementById('inputArea').open=true;
  },
  loadLearning(name){
    const d=CONFIG.learningModules[name];if(!d){this.toast('学习内容不存在','error');return;}
    document.getElementById('learningContent').innerHTML='<h3>'+d.title+'</h3>'+d.content;
    this.toast('已加载：'+d.title,'success');
  },
  generateReport(){
    const data=this.state.data,steps=CONFIG.steps[this.state.mode]||CONFIG.steps.pro;
    const progress=this.updateProgress();
    const type=data.type||'未选择';
    const credibility=data.credibility||'未选择';
    const overview=data.problem?(data.problem.length>30?data.problem.substring(0,30)+'...':data.problem):'未填写';
    const solve=data.solve||'',check=data.check||'';
    let coreAdvice='未填写';
    if(solve&&check)coreAdvice=solve+'；'+check;
    else if(solve)coreAdvice=solve;
    else if(check)coreAdvice=check;
    let html='<div class="report-summary"><div class="report-summary-title">📊 分析摘要</div><div class="report-summary-grid">';
    html+='<div class="item"><span class="label">问题类型</span><span class="value">'+app.escapeHTML(type)+'</span></div>';
    html+='<div class="item"><span class="label">信息来源</span><span class="value">'+app.escapeHTML(credibility)+'</span></div>';
    html+='<div class="item"><span class="label">完成度</span><span class="value">'+progress.percent+'%（'+progress.filled+'/'+progress.total+'步）</span></div>';
    html+='<div class="item"><span class="label">问题概述</span><span class="value">'+app.escapeHTML(overview)+'</span></div>';
    html+='<div class="item full"><span class="label">核心建议</span><span class="value">'+app.escapeHTML(coreAdvice)+'</span></div></div></div>';
    for(let i=0;i<steps.length;i++){
      const s=steps[i];let val=data[s.id]||'未填写';
      if(s.hasCollapse&&s.fields){
        let sub='';
        for(let j=0;j<s.fields.length;j++){const f=s.fields[j];const sv=data[f.id]||'未填写';sub+='<div style="margin-top:4px;padding-left:12px;border-left:2px solid #d8c08a;"><b style="font-size:13px;color:#555;">'+f.label+'：</b><span style="font-weight:400;">'+app.escapeHTML(sv)+'</span></div>';}
        html+='<div class="report-item"><span>【'+s.label+'】</span><div class="quote"><div style="font-weight:700;margin-bottom:6px;">变量拆分：</div><div style="font-weight:400;margin-bottom:8px;">'+app.escapeHTML(val)+'</div><div style="font-weight:700;margin-bottom:4px;">📋 信息分类：</div>'+sub+'</div></div>';
      }else{
        html+='<div class="report-item"><span>【'+s.label+'】</span><div class="quote">'+app.escapeHTML(val)+'</div></div>';
      }
    }
    document.getElementById('result').innerHTML=html;
    document.getElementById('inputArea').open=false;
    document.getElementById('reportArea').open=true;
    document.getElementById('reportArea').scrollIntoView({behavior:'smooth'});
    this.toast('报告已生成','success');
  },
  editAgain(){
    document.getElementById('reportArea').open=false;
    document.getElementById('inputArea').open=true;
    document.getElementById('inputArea').scrollIntoView({behavior:'smooth'});
  },
  clearAll(){
    if(!confirm('确定要清空所有数据吗？'))return;
    this.state.data={};this.renderSteps();
    document.getElementById('result').innerHTML='';
    document.getElementById('typeInfo').textContent='';
    this.updateProgress();
    document.getElementById('reportArea').open=false;
    document.getElementById('inputArea').open=true;
    this.toast('已清空所有数据','success');
  },
  escapeHTML(t){return String(t||'未填写').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
};

// ============================================================
// 启动 & 全局事件
// ============================================================

document.addEventListener('DOMContentLoaded',function(){app.init();});

document.addEventListener('input',function(e){
  if((e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')&&e.target.id&&window.app){
    window.app.state.data[e.target.id]=e.target.value;
    window.app.updateProgress();
  }
});
document.addEventListener('change',function(e){
  if(e.target.tagName==='SELECT'&&e.target.id&&window.app){
    window.app.handleSelectChange(e.target.id);
  }
});

window.app=app;
</script>
</body>
</html>
